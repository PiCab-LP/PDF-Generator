<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Generador de Recibos</title>
    <style>
        /* Estilos base */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top left, #2d0a4e 0%, #1a0533 50%, #0d021a 100%);
            min-height: 100vh;
            padding: 40px;
            color: #2d2d3d;
        }

        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        /* Sidebar con Checklist */
        .sidebar {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            color: white;
            height: fit-content;
            max-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
        }

        .sidebar h3 { 
            margin-bottom: 20px; 
            font-size: 20px; 
            font-weight: 700;
            background: linear-gradient(90deg, #d500ba, #7b2ff2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #companyList {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            overflow-y: auto;
            padding-right: 8px;
        }

        /* Custom scrollbar para la lista */
        #companyList::-webkit-scrollbar { width: 6px; }
        #companyList::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 4px; }
        #companyList::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        #companyList::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        .company-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 14px 16px;
            font-size: 14px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .company-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .company-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .company-actions {
            margin-left: auto;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .company-item:hover .company-actions {
            opacity: 1;
        }

        .action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.1);
        }

        .company-item.done { 
            opacity: 0.5; 
        }
        
        .company-item.done span {
            text-decoration: line-through;
        }

        .status-dot { 
            width: 22px; 
            height: 22px; 
            border-radius: 6px; 
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(0,0,0,0.2); 
            flex-shrink: 0; 
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-dot.completed { 
            background: #28a745; 
            border-color: #28a745;
            box-shadow: 0 0 12px rgba(40, 167, 69, 0.4); 
        }

        .status-dot.completed::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }
        
        .company-contact {
            font-size: 13.5px;
            color: rgba(255, 255, 255, 0.95);
            margin-left: 34px;
            margin-top: 4px;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            text-decoration: none !important;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            width: fit-content;
        }

        /* Formulario Principal */
        .form-container {
            background: #ffffff;
            border-radius: 24px;
            padding: 45px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            height: fit-content;
        }

        .progress-bar { 
            width: 100%; 
            height: 10px; 
            background: #f0ebf8; 
            border-radius: 10px; 
            margin-bottom: 30px; 
            overflow: hidden;
        }
        
        .progress { 
            height: 100%; 
            background: linear-gradient(90deg, #7b2ff2, #d500ba); 
            width: 0%; 
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 0 10px rgba(213, 0, 186, 0.5);
        }

        .form-container h2 {
            color: #1a0533;
            margin-bottom: 30px;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -0.5px;
        }

        .form-group { margin-bottom: 24px; }
        .form-group label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 10px; 
            color: #4a4a68; 
            font-size: 14px;
        }
        
        .form-group input, 
        .form-group select {
            width: 100%; 
            padding: 14px 16px; 
            border: 2px solid #e8e0f0; 
            border-radius: 12px; 
            background: #faf8fd;
            font-family: inherit;
            font-size: 15px;
            color: #1a0533;
            transition: all 0.3s ease;
        }

        .form-group input:focus, 
        .form-group select:focus {
            outline: none;
            border-color: #7b2ff2;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(123, 47, 242, 0.1);
        }

        .btn-submit {
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 14px;
            background: linear-gradient(135deg, #7b2ff2 0%, #d500ba 100%);
            color: white; 
            font-weight: 700; 
            font-size: 16px;
            cursor: pointer; 
            transition: all 0.3s ease;
            margin-top: 10px;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 20px rgba(123, 47, 242, 0.3);
        }

        .btn-submit:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 12px 25px rgba(213, 0, 186, 0.4); 
        }
        
        .btn-submit:active {
            transform: translateY(1px);
        }
        
        .btn-submit:disabled {
            background: #a097b0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(13, 2, 26, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            transform: translateY(20px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }
        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(0,0,0,0.05);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 20px;
            color: #6c5b7b;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .modal-close:hover {
            color: #1a0533;
            background: rgba(0,0,0,0.1);
        }
        .header-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 15px;
        }
        .add-company-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .add-company-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-1px);
        }
        /* Loading Overlay & Custom Alert */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(13, 2, 26, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            color: white;
        }
        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: #d500ba;
            border-bottom-color: #7b2ff2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="sidebar">
        <div class="header-actions">
            <h3 style="margin-bottom: 0;">Checklist Envío</h3>
            <button class="add-company-btn" onclick="crearCompania()">+ Nueva</button>
        </div>
        <div id="companyList">
            </div>
    </div>

    <div class="main-content" style="display: flex; flex-direction: column; gap: 30px;">
        <div class="form-container">
            <div class="progress-bar"><div class="progress" id="progressBar"></div></div>
            <h2 style="color: #2d0a4e; margin-bottom: 20px;">Generar Nuevo Recibo</h2>
            
            <form id="receiptForm">
                <div class="form-group">
                    <label>Seleccionar Compañía Pendiente</label>
                    <select id="companySelect" required>
                        <option value="">Cargando compañías...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Fecha del Balance (Inglés)</label>
                    <input type="text" id="fecha" placeholder="March 20th, 2026" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Deposits (+)</label>
                        <input type="number" step="0.01" id="deposits" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Cashouts (-)</label>
                        <input type="number" step="0.01" id="cashouts" placeholder="0.00" required>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Licensee Fee (-)</label>
                        <input type="number" step="0.01" id="fee" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Games Credits (-)</label>
                        <input type="number" step="0.01" id="credits" placeholder="0.00" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">GENERAR PDF Y MARCAR ENVIADO</button>
            </form>
        </div>

    </div>
</div>

<!-- Modal Administrar Compañía -->
<div class="modal-overlay" id="companyModal">
    <div class="modal-content">
        <button class="modal-close" onclick="cerrarModal()">&times;</button>
        <h2 style="color: #1a0533; margin-bottom: 25px; font-weight: 800; font-size: 22px;" id="modalTitle">Agregar Compañía</h2>
        <form id="companyAdminForm">
            <input type="hidden" id="editCompanyId">
            <div class="form-group">
                <label>Nombre de Compañía</label>
                <input type="text" id="adminCompanyName" placeholder="Ej. Casino Royale" required>
            </div>
            <div class="form-group" style="margin-bottom: 30px;">
                <label>Teléfono o Correo (Opcional)</label>
                <input type="text" id="adminCompanyPhone" placeholder="Ej. +1 234 567 8900 o num@correo.com">
            </div>
            <button type="submit" class="btn-submit" id="btnSaveCompany">AGREGAR</button>
        </form>
    </div>
</div>

<!-- Custom Alert Modal -->
<div class="modal-overlay" id="customAlertModal" style="z-index: 2001;">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <h2 style="color: #1a0533; margin-bottom: 15px; font-weight: 800; font-size: 22px;" id="alertTitle">Mensaje</h2>
        <p id="alertMessage" style="color: #4a4a68; margin-bottom: 25px; line-height: 1.5; font-size: 15px;"></p>
        <button class="btn-submit" onclick="cerrarAlerta()" style="padding: 14px 30px; width: auto; min-width: 140px; margin-top: 0;">ENTENDIDO</button>
    </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <h3 style="font-weight: 700; font-size: 20px; letter-spacing: -0.5px;">Generando PDF...</h3>
    <p style="opacity: 0.7; font-size: 14px; margin-top: 8px;">Esto durará unos segundos, ¡no cierres la pestaña!</p>
</div>

<script>
// 1. CONFIGURACIÓN GLOBAL: Pega aquí tu URL de Render (Sin la barra '/' al final)
    const API_URL = 'https://pdf-generator-g87e.onrender.com'; 

    // Utilidades UI (Se mantienen igual)
    function mostrarAlerta(titulo, mensaje) {
        document.getElementById('alertTitle').innerText = titulo;
        document.getElementById('alertMessage').innerText = mensaje;
        document.getElementById('customAlertModal').classList.add('active');
    }

    function cerrarAlerta() {
        document.getElementById('customAlertModal').classList.remove('active');
    }

    function mostrarLoading(mostrar) {
        if (mostrar) {
            document.getElementById('loadingOverlay').classList.add('active');
        } else {
            document.getElementById('loadingOverlay').classList.remove('active');
        }
    }

    // Conexión con Supabase a través de Render
    async function cargarEstado() {
        try {
            // CAMBIO: Ahora apunta a Render
            const response = await fetch(`${API_URL}/api/companias`);
            const data = await response.json();
            
            const list = document.getElementById('companyList');
            list.innerHTML = data.map(c => `
                <div class="company-item ${c.enviado ? 'done' : ''}">
                    <div class="company-header">
                        <div class="status-dot ${c.enviado ? 'completed' : ''}"></div>
                        <span>${c.name}</span>
                        <div class="company-actions">
                            <button class="action-btn" onclick="editarCompania('${c.id}', '${c.name.replace(/'/g, "\\'")}', '${(c.telefono || '').replace(/'/g, "\\'")}')" title="Editar">✏️</button>
                            <button class="action-btn" onclick="borrarCompania('${c.id}')" title="Borrar">🗑️</button>
                        </div>
                    </div>
                    ${c.telefono ? `<span class="company-contact">📞 | ✉️ &nbsp; ${c.telefono}</span>` : ''}
                </div>
            `).join('');

            const select = document.getElementById('companySelect');
            const pendientes = data.filter(c => !c.enviado);
            
            select.innerHTML = '<option value="">Elegir compañía...</option>' + 
                pendientes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

            const completados = data.filter(c => c.enviado).length;
            const porcentaje = data.length > 0 ? (completados / data.length) * 100 : 0;
            document.getElementById('progressBar').style.width = porcentaje + '%';
        } catch (err) {
            console.error("Error al cargar datos:", err);
            mostrarAlerta("Error de Conexión", "No se pudo conectar con el servidor en Render.");
        }
    }

    document.getElementById('receiptForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        const originalText = btn.innerText;
        
        btn.innerText = "Generando PDF...";
        btn.disabled = true;
        mostrarLoading(true);

        const companyId = document.getElementById('companySelect').value;
        const companyName = document.getElementById('companySelect').options[document.getElementById('companySelect').selectedIndex].text;

        try {
            // CAMBIO: Ahora apunta a Render
            const res = await fetch(`${API_URL}/api/generar-pdf`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    id: companyId,
                    companyName: companyName,
                    date: document.getElementById('fecha').value,
                    deposits: document.getElementById('deposits').value,
                    cashouts: document.getElementById('cashouts').value,
                    fee: document.getElementById('fee').value,
                    credits: document.getElementById('credits').value
                })
            });

            if (!res.ok) {
                const errorData = await res.json();
                throw new Error(errorData.error || 'Error en el servidor');
            }

            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${companyName.replace(/\s+/g, '_')}_${Date.now()}.pdf`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            a.remove();

            mostrarAlerta("¡Éxito!", "¡Recibo generado y guardado en la base de datos!");
            await cargarEstado();
            e.target.reset(); 
            
        } catch (err) {
            mostrarAlerta("Error al Generar", "Hubo un problema: " + err.message);
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
            mostrarLoading(false);
        }
    };

    // Carga inicial
    cargarEstado();

    // Admin Functions
    function abrirModal(titulo, id = '', nombre = '', telefono = '') {
        document.getElementById('modalTitle').innerText = titulo;
        document.getElementById('editCompanyId').value = id;
        document.getElementById('adminCompanyName').value = nombre;
        document.getElementById('adminCompanyPhone').value = telefono;
        document.getElementById('btnSaveCompany').innerText = id ? 'GUARDAR CAMBIOS' : 'AGREGAR';
        document.getElementById('companyModal').classList.add('active');
        document.getElementById('adminCompanyName').focus();
    }

    function cerrarModal() {
        document.getElementById('companyModal').classList.remove('active');
        document.getElementById('companyAdminForm').reset();
    }

    function crearCompania() {
        abrirModal('Agregar Compañía');
    }

    function editarCompania(id, name, telefono) {
        abrirModal('Editar Compañía', id, name, telefono);
    }

    document.getElementById('companyAdminForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('editCompanyId').value;
        const name = document.getElementById('adminCompanyName').value;
        const telefono = document.getElementById('adminCompanyPhone').value;
        const btn = document.getElementById('btnSaveCompany');
        const originalText = btn.innerText;

        btn.innerText = "Guardando...";
        btn.disabled = true;

        try {
            // CAMBIO: Ahora apunta a Render
            const res = await fetch(`${API_URL}/api/admin/compania`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id ? id : undefined, name, telefono })
            });
            if(!res.ok) throw new Error("Error al guardar la compañía");
            
            cerrarModal();
            await cargarEstado();
            mostrarAlerta("¡Compañía Guardada!", "La base de datos se actualizó correctamente.");
        } catch(err) {
            mostrarAlerta("Error", "Hubo un problema: " + err.message);
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    };

    async function borrarCompania(id) {
        if(!confirm("¿Estás seguro de que deseas eliminar (ocultar) esta compañía de la lista?")) return;
        try {
            // CAMBIO: Ahora apunta a Render
            const res = await fetch(`${API_URL}/api/admin/compania/${id}`, { method: 'DELETE' });
            if(!res.ok) throw new Error("Error al eliminar la compañía");
            await cargarEstado();
            mostrarAlerta("Eliminada", "La compañía fue eliminada/ocultada correctamente.");
        } catch(err) {
            mostrarAlerta("Error", "Hubo un problema: " + err.message);
        }
    }
</script>
</body>
</html>
